<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ward Task Manager — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #005eb8;
      color: white;
      padding: 16px 24px;
    }

    header h1 { font-size: 1.5rem; }
    header p { font-size: 0.9rem; opacity: 0.85; }

    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      background: white;
      border-radius: 8px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    .auth-card h2 {
      color: #005eb8;
      margin-bottom: 8px;
    }

    .auth-card p {
      color: #666;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    .tabs {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab {
      padding: 10px 20px;
      cursor: pointer;
      color: #666;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-size: 0.95rem;
    }

    .tab.active {
      color: #005eb8;
      border-bottom-color: #005eb8;
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: #333;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.95rem;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #005eb8;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #005eb8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn:hover { background: #004a93; }

    .error-msg {
      background: #fde8e8;
      color: #d5281b;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .success-msg {
      background: #e8f5ee;
      color: #007f3b;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>🏥 Ward Task Manager</h1>
    <p>Manage and track ward tasks efficiently</p>
  </header>

  <div class="auth-container">
    <div class="auth-card">

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" id="loginTab">Login</div>
        <div class="tab" id="registerTab">Register</div>
      </div>

      <!-- Error/Success messages -->
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password">
        </div>
        <button class="btn" id="loginBtn">Login</button>
      </div>

      <!-- Register Form -->
      <div id="registerForm" style="display:none;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="e.g. Nurse Johnson">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="regRole">
            <option value="staff">Staff</option>
            <option value="manager">Manager</option>
          </select>
        </div>
        <button class="btn" id="registerBtn">Register</button>
      </div>

    </div>
  </div>

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script>
    // ==========================================
    // JQUERY - Tab switching
    // ==========================================
    $('#loginTab').on('click', function() {
      $('#loginTab').addClass('active');
      $('#registerTab').removeClass('active');
      $('#loginForm').show();
      $('#registerForm').hide();
      $('#errorMsg, #successMsg').hide();
    });

    $('#registerTab').on('click', function() {
      $('#registerTab').addClass('active');
      $('#loginTab').removeClass('active');
      $('#registerForm').show();
      $('#loginForm').hide();
      $('#errorMsg, #successMsg').hide();
    });

    // ==========================================
    // JQUERY - Show error/success messages
    // ==========================================
    function showError(msg) {
      $('#errorMsg').text(msg).show();
      $('#successMsg').hide();
    }

    function showSuccess(msg) {
      $('#successMsg').text(msg).show();
      $('#errorMsg').hide();
    }

    // ==========================================
    // JQUERY - Handle Login
    // ==========================================
    $('#loginBtn').on('click', function() {
      const email = $('#loginEmail').val().trim();
      const password = $('#loginPassword').val().trim();

      if (!email || !password) {
        showError('Please enter your email and password');
        return;
      }

      $.ajax({
        url: '/api/auth/login',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ email, password }),
        success: function(response) {
          // Save token and user info to localStorage
          localStorage.setItem('token', response.token);
          localStorage.setItem('user', JSON.stringify(response.user));

          // Redirect to main app
          window.location.href = '/';
        },
        error: function(xhr) {
          const msg = xhr.responseJSON?.error || 'Login failed';
          showError(msg);
        }
      });
    });

    // ==========================================
    // JQUERY - Handle Register
    // ==========================================
    $('#registerBtn').on('click', function() {
      const name = $('#regName').val().trim();
      const email = $('#regEmail').val().trim();
      const password = $('#regPassword').val().trim();
      const role = $('#regRole').val();

      if (!name || !email || !password) {
        showError('Please fill in all fields');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      $.ajax({
        url: '/api/auth/register',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ name, email, password, role }),
        success: function(response) {
          // Save token and user info to localStorage
          localStorage.setItem('token', response.token);
          localStorage.setItem('user', JSON.stringify(response.user));

          // Redirect to main app
          window.location.href = '/';
        },
        error: function(xhr) {
          const msg = xhr.responseJSON?.error || 'Registration failed';
          showError(msg);
        }
      });
    });

    // If already logged in redirect to main app
    if (localStorage.getItem('token')) {
      window.location.href = '/';
    }
  </script>

</body>
</html>
